version: "3"

tasks:
  run:
    desc: Run the service locally with Go
    cmds:
      - go run ./cmd/server

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  build:
    desc: Build the service binary
    cmds:
      - mkdir -p bin
      - go build -o bin/certificate-inspector ./cmd/server

  docker-up:
    desc: Start the full local stack
    cmds:
      - docker compose up --build

  docker-up-detached:
    desc: Start the full local stack in the background
    cmds:
      - docker compose up -d --build

  docker-down:
    desc: Stop the local stack
    cmds:
      - docker compose down

  docker-config:
    desc: Render the Docker Compose configuration as formatted YAML
    cmds:
      - docker compose config | yq .

  db-reset:
    desc: Stop the local stack and remove the Docker volume that stores SQLite data
    cmds:
      - docker compose down --volumes

  db-reset-local:
    desc: Remove the local SQLite database used by task run
    cmds:
      - rm -f certificate-inspector.db certificate-inspector.db-shm certificate-inspector.db-wal

  api:health:
    desc: Call GET /healthz
    cmds:
      - curl -fsS "${BASE_URL:-http://localhost:8080}/healthz" | jq .

  api:ready:
    desc: Call GET /readyz
    cmds:
      - curl -fsS "${BASE_URL:-http://localhost:8080}/readyz" | jq .

  api:list:
    desc: Call GET /jobs
    cmds:
      - curl -fsS "${BASE_URL:-http://localhost:8080}/jobs?limit=${LIMIT:-10}" | jq .

  api:submit:
    desc: "Submit a certificate inspection job. Usage: task api:submit HOSTNAME=example.com"
    cmds:
      - |
        hostname="${HOSTNAME:-example.com}"
        port="${PORT:-443}"
        idempotency_key="${IDEMPOTENCY_KEY:-api-$(date +%s)-$$}"
        curl -fsS -X POST "${BASE_URL:-http://localhost:8080}/jobs" \
          -H 'Content-Type: application/json' \
          -d "{\"hostname\":\"${hostname}\",\"port\":${port},\"idempotency_key\":\"${idempotency_key}\"}" | jq .

  api:status:
    desc: "Get job status. Usage: task api:status JOB_ID=<id>"
    cmds:
      - |
        test -n "${JOB_ID:-}" || (echo "JOB_ID is required" >&2; exit 1)
        curl -fsS "${BASE_URL:-http://localhost:8080}/jobs/${JOB_ID}/status" | jq .

  api:result:
    desc: "Get job result. Usage: task api:result JOB_ID=<id>"
    cmds:
      - |
        test -n "${JOB_ID:-}" || (echo "JOB_ID is required" >&2; exit 1)
        curl -fsS "${BASE_URL:-http://localhost:8080}/jobs/${JOB_ID}/result" | jq .

  api:inspect:
    desc: "Submit a job, poll it, and print the final result. Usage: task api:inspect HOSTNAME=example.com"
    cmds:
      - ./scripts/api-inspect.sh

  demo:
    desc: Exercise the API with one or more hostnames
    cmds:
      - ./scripts/demo.sh

  demo-batch:
    desc: Exercise the API with a batch that includes success and failure cases
    cmds:
      - HOSTNAMES="example.com|github.com|expired.badssl.com" ./scripts/demo.sh

  demo-big-batch:
    desc: Exercise the API with a larger hostname batch to make queue metrics easier to see
    cmds:
      - HOSTNAMES="example.com|github.com|gitlab.com|google.com|cloudflare.com|letsencrypt.org|prometheus.io|grafana.com|golang.org|docker.com|kubernetes.io|sqlite.org|ietf.org|wikipedia.org|mozilla.org|expired.badssl.com|wrong.host.badssl.com|self-signed.badssl.com" ./scripts/demo.sh
