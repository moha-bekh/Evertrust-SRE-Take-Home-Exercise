services:
  certificate-inspector:
    build: .
    environment:
      LISTEN_ADDRESS: ":8080"
      DATABASE_PATH: "/data/certificate-inspector.db"
      MIGRATIONS_PATH: "/app/migrations"
      WORKER_JOB_DELAY: "750ms"
    ports:
      - "8080:8080"
    volumes:
      - certificate-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - certificate-inspector

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_LOG_FILTERS: "authn.service:error"
      GF_USERS_DEFAULT_THEME: "light"
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./ops/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

volumes:
  certificate-data:
